services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      # These build args are REQUIRED at build time for Next.js
      # NEXT_PUBLIC_* variables must be available during build to be inlined
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
        - NEXT_PUBLIC_FORM_ENDPOINT=${NEXT_PUBLIC_FORM_ENDPOINT}
    container_name: top-brands
    restart: always
    ports:
      - "9101:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - NEXT_PUBLIC_FORM_ENDPOINT=${NEXT_PUBLIC_FORM_ENDPOINT}
